name: Deploy to GitHub Pages

on:
  push:
    branches: [main]

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
      - run: npm ci
      - run: npm run build
        env:
          # Public URL of the Bardi Report Worker endpoint. Set this as a repo
          # Variable (Settings → Secrets and variables → Actions → Variables):
          #   BARDI_REPORT_URL = https://<worker>.workers.dev/latest.json
          # If unset, the site falls back to the bundled sample edition.
          VITE_BARDI_REPORT_URL: ${{ vars.BARDI_REPORT_URL }}
      - uses: actions/upload-pages-artifact@v3
        with:
          path: dist

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - id: deployment
        uses: actions/deploy-pages@v4
